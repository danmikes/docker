{% extends 'base.htm' %}

{% block title %}Home - Mikes Consult{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <h1 class="title is-1 has-text-centered has-text-light">Expertise</h1>
    <p class="subtitle is-4 has-text-centered has-text-grey-light">
      Optimum approach
    </p>

    <!-- Section Features -->
    <div class="columns is-vcentered is-multiline">
      <div class="column is-4">
        <div class="card feature-card">
          <div class="card-content has-text-centered">
            <div class="icon is-large has-text-success">
              <i class="fas fa-handshake fa-3x"></i>
            </div>
            <h3 class="title is-4 mt-4">Cohesion</h3>
            <p>Close collaboration for mutual benefit</p>
          </div>
        </div>
      </div>

      <div class="column is-4">
        <div class="card feature-card">
          <div class="card-content has-text-centered">
            <div class="icon is-large has-text-info">
              <i class="fas fa-chart-bar fa-3x"></i>
            </div>
            <h3 class="title is-4 mt-4">Analysis</h3>
            <p>Solid analysis for effective strategy</p>
          </div>
        </div>
      </div>

      <div class="column is-4">
        <div class="card feature-card">
          <div class="card-content has-text-centered">
            <div class="icon is-large has-text-primary">
              <i class="fas fa-rocket fa-3x"></i>
            </div>
            <h3 class="title is-4 mt-4">Speed</h3>
            <p>Quick implementation for optimum result</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
